<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · Fran Freitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #00bcd4;
      --teal-dark: #0097a7;
      --teal-deep: #004d5e;
      --amber: #ff9800;
      --cream: #faf8f5;
      --fog: #e8f4f7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      background: var(--cream);
    }

    /* LEFT PANEL — decorative */
    .panel-left {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--teal-deep);
    }

    .panel-left .bg-img {
      position: absolute;
      inset: 0;
      background-image: url('bg-estetica.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.18;
    }

    .panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #004d5e 0%, #00838f 50%, #003f4f 100%);
      opacity: 0.9;
    }

    .panel-left-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 60px 50px;
      animation: fadeSlideLeft 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeSlideLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .panel-left .logo-wrap img {
      height: 90px;
      filter: brightness(0) invert(1) opacity(0.9);
      margin-bottom: 32px;
    }

    .panel-left h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      color: #fff;
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .panel-left h1 em {
      font-style: italic;
      font-weight: 400;
      color: #a8e6ef;
    }

    .panel-left .tagline {
      margin-top: 14px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .deco-line {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.3);
      margin: 28px auto;
    }

    .panel-left .quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: rgba(255,255,255,0.65);
      max-width: 280px;
      line-height: 1.6;
    }

    /* RIGHT PANEL — form */
    .panel-right {
      width: 480px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 50px;
      background: var(--cream);
      position: relative;
    }

    .panel-right::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(0,188,212,0.3), transparent);
    }

    .form-wrap {
      width: 100%;
      animation: fadeSlideRight 0.9s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeSlideRight {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--teal-dark);
      text-decoration: none;
      margin-bottom: 52px;
      transition: gap 0.2s;
    }
    .back-link:hover { gap: 10px; }

    .form-header {
      margin-bottom: 44px;
    }

    .form-header .eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 10px;
    }

    .form-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: var(--teal-deep);
      line-height: 1.1;
    }

    .form-header p {
      margin-top: 10px;
      font-size: 0.88rem;
      color: #7a9ea8;
    }

    .field {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal-deep);
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      background: #fff;
      border: 1.5px solid #d0e8ee;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--teal-deep);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,188,212,0.1);
    }

    input::placeholder { color: #b0cdd4; }

    .btn-login {
      width: 100%;
      margin-top: 10px;
      padding: 15px;
      background: var(--teal-deep);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn-login:hover { background: var(--teal-dark); transform: translateY(-1px); }
    .btn-login:hover::after { transform: translateX(100%); }
    .btn-login:active { transform: translateY(0); }

    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff0f0;
      border-left: 3px solid #e74c3c;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #c0392b;
    }
    .error-msg.visible { display: block; }

    /* mobile */
    @media (max-width: 780px) {
      body { flex-direction: column; }
      .panel-left {
        min-height: 220px;
        flex: none;
      }
      .panel-left-content { padding: 40px 30px; }
      .panel-left h1 { font-size: 2.2rem; }
      .panel-left .quote { display: none; }
      .panel-right {
        width: 100%;
        padding: 40px 28px;
      }
      .panel-right::before { display: none; }
    }
  </style>
</head>
<body>
  <div class="panel-left">
    <div class="bg-img"></div>
    <div class="panel-left-content">
      <div class="logo-wrap">
        <img src="../img/logo.png" alt="Logo Fran Freitas">
      </div>
      <h1>Fran<br><em>Freitas</em></h1>
      <p class="tagline">Biomédica Esteta</p>
      <div class="deco-line"></div>
      <p class="quote">"Ciência e arte em cada tratamento que transformamos juntas."</p>
    </div>
  </div>

  <div class="panel-right">
    <div class="form-wrap">
      <a href="../index.html" class="back-link">← voltar ao site</a>

      <div class="form-header">
        <p class="eyebrow">Área Restrita</p>
        <h2>Bem-vinda<br>de volta</h2>
        <p>Faça login para acessar os orçamentos</p>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" placeholder="Digite o usuário" required />
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-login">Entrar</button>
        <p id="errorMessage" class="error-msg"></p>
      </form>
    </div>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
