<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Área de Orçamentos</title>
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>
  <a href="../index.html" class="back-link">← Voltar</a>

  <div class="login-container">
    <div class="login-header">
      <img src="../img/logo.png" alt="Logo Fran Freitas" class="login-logo">
      <h1>Fran Freitas</h1>
      <p class="subtitle">Biomédica Esteta</p>
    </div>
    
    <h2>Área Restrita</h2>
    <form id="loginForm">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" placeholder="Digite o usuário" required />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="Digite a senha" required />

      <button type="submit">Entrar</button>
      <p id="errorMessage" class="error-message"></p>
    </form>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
